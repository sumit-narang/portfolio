<body>



<div id="lightning"></div>
<a id="warnPill" href="/" role="button" tabindex="0" aria-label="Go back to homepage">Go back home</a>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ─────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xd8eef5, 80, 200);

// ── Camera (locked — no user interaction) ────────────────────
const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 1.0, 500);
camera.position.set(-73.3, 29.1, 1.6);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(2.5, 0.0, 0.0);
controls.enableDamping    = true;
controls.dampingFactor    = 0.06;
controls.minAzimuthAngle  = -94 * Math.PI / 180;
controls.maxAzimuthAngle  = -83 * Math.PI / 180;
controls.minPolarAngle    =  64 * Math.PI / 180;
controls.maxPolarAngle    =  74 * Math.PI / 180;
controls.minDistance      = 79;
controls.maxDistance      = 86;
controls.update();

// ── Sky dome ─────────────────────────────────────────────────
const SKY_SUN = new THREE.Vector3(0.20, 0.75, -0.63).normalize();
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    uTop:    { value: new THREE.Color(0x0d1520) },
    uMid:    { value: new THREE.Color(0x1c2d3e) },
    uHorizon:{ value: new THREE.Color(0xb8ccd8) },
    uSunDir: { value: SKY_SUN },
  },
  vertexShader:`
    varying vec3 vP;
    void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1); }
  `,
  fragmentShader:`
    uniform vec3 uTop,uMid,uHorizon,uSunDir;
    varying vec3 vP;
    float hash(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+19.19);return fract(p.x*p.y);}
    float fbm(vec2 p){float v=0.,a=0.5;for(int i=0;i<5;i++){v+=a*hash(p);p=p*2.1+vec2(1.3,2.7);a*=.5;}return v;}
    void main(){
      vec3 dir=normalize(vP);
      float t=clamp(dir.y,0.,1.);
      vec3 c=mix(mix(uHorizon,uMid,pow(t,0.4)),uTop,pow(t,1.2));
      // Bright silvery-white break at the horizon (light under the clouds)
      float haze = exp(-t * 6.0);
      c = mix(c, vec3(0.82, 0.88, 0.92), haze * 0.75);
      // Thin bright sliver right at horizon line
      float horizonBright = exp(-t * 28.0);
      c = mix(c, vec3(0.90, 0.93, 0.96), horizonBright * 0.65);
      // Heavy dark storm clouds — deep navy-blue bodies
      float cloudT = smoothstep(0.04, 0.65, t);
      float cloud1 = fbm(dir.xz*2.2+vec2(0.5,1.2)) * fbm(dir.xz*1.1+vec2(2.1,0.8));
      float cloud2 = fbm(dir.xz*3.8+vec2(1.3,0.4)) * 0.5;
      float cloud = smoothstep(0.20, 0.44, cloud1 + cloud2 * 0.4) * cloudT;
      c = mix(c, vec3(0.10, 0.14, 0.20), cloud * 0.95);
      // Silver-lit cloud edges — diffuse light from below breaks through
      float cloudSoft = smoothstep(0.16, 0.22, cloud1 + cloud2 * 0.4) * cloudT;
      float edgeLit = (cloudSoft - cloud * 0.85) * 2.5;
      c = mix(c, vec3(0.50, 0.58, 0.65), clamp(edgeLit, 0.0, 1.0) * 0.75);
      // Rain-curtain near horizon — cool dark blue-gray
      float curtain = (1.0-smoothstep(0.0,0.18,t)) * fbm(dir.xz*4.0+vec2(0.3)) * 0.40;
      c = mix(c, vec3(0.18, 0.22, 0.28), curtain);
      gl_FragColor=vec4(c,1.);
    }
  `,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(400,32,16), skyMat));

// ── Lighting ─────────────────────────────────────────────────
const sunDir = SKY_SUN.clone();
scene.add(new THREE.AmbientLight(0x6a7d8e, 0.55));
const sun = new THREE.DirectionalLight(0xc8d8e8, 1.4);
sun.position.copy(sunDir).multiplyScalar(120);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{left:-80,right:80,top:80,bottom:-80,near:1,far:250});
scene.add(sun);

// ── Gerstner waves ────────────────────────────────────────────
const WAVES = [
  [0.30,14.0,-1.00, 0.00,0.52],
  [0.20, 9.0,-0.98, 0.18,0.48],
  [0.16, 6.0,-0.98,-0.18,0.42],
  [0.11, 3.8,-0.94, 0.34,0.38],
  [0.09, 2.4,-0.94,-0.34,0.32],
  [0.07, 1.6,-0.99, 0.14,0.28],
  [0.05, 1.1,-0.97, 0.26,0.22],
  [0.04, 0.7,-0.97,-0.26,0.18],
];

const waterUniforms = {
  uTime:       { value:0 },
  uWaveH:      { value:1.10 },
  uSpeed:      { value:1.20 },
  uChop:       { value:1.40 },
  uWindAngle:  { value:0.0 },
  uShoreAmp:   { value:0.0 },
  uShoreOffset:{ value:7.0 },
  uShoreSpeed: { value:0.0 },
  uFoamAmt:    { value:0.0 },
  uSwashAmt:   { value:0.60 },
  uSunDir:     { value:sunDir },
  uSkyTop:     { value:new THREE.Color(0x5b9fd4) },
  uSkyHorizon: { value:new THREE.Color(0xd8eef5) },
  uDeepCol:    { value:new THREE.Color(0x1a8fb0) },
  uMidCol:     { value:new THREE.Color(0x2e85c7) },
  uShallowCol: { value:new THREE.Color(0x5cd8e4) },
  uFoamCol:    { value:new THREE.Color(0xf0faff) },
  uAmps:  { value:WAVES.map(w=>w[0]) },
  uLens:  { value:WAVES.map(w=>w[1]) },
  uDirX:  { value:WAVES.map(w=>w[2]) },
  uDirZ:  { value:WAVES.map(w=>w[3]) },
  uSteep: { value:WAVES.map(w=>w[4]) },
};

const waterVert = `
  #define NW 8
  uniform float uTime,uWaveH,uSpeed,uChop,uWindAngle;
  uniform float uAmps[NW],uLens[NW],uDirX[NW],uDirZ[NW],uSteep[NW];
  varying vec3 vPos,vNormal; varying float vFoam;
  vec3 gerstner(vec3 p){
    vec3 d=vec3(0.); float cA=cos(uWindAngle),sA=sin(uWindAngle);
    for(int i=0;i<NW;i++){
      float A=uAmps[i]*uWaveH,L=uLens[i],k=6.28318/L;
      float dx=uDirX[i]*cA-uDirZ[i]*sA,dz=uDirX[i]*sA+uDirZ[i]*cA;
      float ph=k*(dx*p.x+dz*p.z)-uSpeed*sqrt(9.81*k)*uTime;
      float Q=uChop*uSteep[i]/(k*A*float(NW));
      d.x+=Q*A*dx*cos(ph);d.z+=Q*A*dz*cos(ph);d.y+=A*sin(ph);
    } return d;
  }
  vec3 gerstnerN(vec3 p,float e){
    vec3 px=p+vec3(e,0,0)+gerstner(p+vec3(e,0,0));
    vec3 mx=p-vec3(e,0,0)+gerstner(p-vec3(e,0,0));
    vec3 pz=p+vec3(0,0,e)+gerstner(p+vec3(0,0,e));
    vec3 mz=p-vec3(0,0,e)+gerstner(p-vec3(0,0,e));
    return normalize(cross(pz-mz,px-mx));
  }
  void main(){
    vec3 p=position,disp=gerstner(p),wPos=p+disp;
    vPos=wPos; vNormal=gerstnerN(p,0.18);
    vFoam=smoothstep(0.5,1.4,disp.y/max(uWaveH,0.01));
    gl_Position=projectionMatrix*modelViewMatrix*vec4(wPos,1.);
  }
`;

const waterFrag = `
  uniform vec3 uSunDir,uSkyTop,uSkyHorizon,uDeepCol,uMidCol,uShallowCol,uFoamCol;
  uniform float uTime,uShoreAmp,uShoreOffset,uShoreSpeed,uFoamAmt,uSwashAmt;
  varying vec3 vPos,vNormal; varying float vFoam;
  float hash(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+19.19);return fract(p.x*p.y);}
  float fbm(vec2 p){float v=0.,a=0.5;for(int i=0;i<4;i++){v+=a*hash(p);p=p*2.1+vec2(1.3,2.7);a*=.5;}return v;}
  float shoreEdge(float z,float t){
    t*=uShoreSpeed;
    return (sin(z*0.048+t*0.18)*5.0
           +sin(z*0.119-t*0.13)*3.0
           +sin(z*0.027+t*0.07)*6.5
           +sin(z*0.073-t*0.09)*2.0)*uShoreAmp+uShoreOffset;
  }
  void main(){
    vec3 N=normalize(vNormal),V=normalize(cameraPosition-vPos),L=normalize(uSunDir),H=normalize(L+V);
    float fr=0.04+0.96*pow(1.-clamp(dot(N,V),0.,1.),3.5);
    vec3 skyCol=mix(uSkyHorizon,uSkyTop,clamp(reflect(-V,N).y*2.5,0.,1.));
    vec3 waterCol=mix(uShallowCol,uDeepCol,clamp(vPos.y*0.5+0.5,0.,1.));
    waterCol+=vec3(0.12,0.50,0.55)*pow(clamp(dot(L,-N),0.,1.),2.5)*0.35;
    float spec=pow(clamp(dot(N,H),0.,1.),260.)*3.5;
    vec3 col=mix(waterCol,skyCol,fr)+vec3(1.,.97,.9)*spec;
    float foamTex=fbm(vPos.xz*1.6+vec2(uTime*0.05,0.));
    col=mix(col,uFoamCol.rgb,smoothstep(0.15,0.55,vFoam*foamTex*2.8)*0.92);
    float se=shoreEdge(vPos.z,uTime);
    float rollingFoam=0.;
    for(int i=0;i<6;i++){
      float fi=float(i);
      float phase=fract(vPos.x*0.072-uTime*0.30+fi*0.1667);
      float band=smoothstep(0.,0.06,phase)*smoothstep(0.22,0.06,phase);
      float zwob=sin(vPos.z*0.12+fi*2.3+uTime*0.08)*0.5+0.5;
      float amp=1.-smoothstep(0.,35.,vPos.x-se);
      float ft=fbm(vPos.xz*2.8+vec2(uTime*0.18+fi*0.4,fi));
      rollingFoam+=band*amp*(0.5+0.5*zwob)*(0.55+0.45*ft);
    }
    col=mix(col,vec3(0.97,1.,1.),clamp(rollingFoam,0.,1.)*0.94*uFoamAmt);
    float swash=1.-smoothstep(0.,5.,vPos.x-se);
    col=mix(col,vec3(0.95,.99,1.),clamp(swash*fbm(vPos.xz*2.+vec2(uTime*.32,uTime*.14))*2.5,0.,1.)*0.82*uSwashAmt);
    col=mix(col,vec3(0.72,0.82,0.70),(1.-smoothstep(0.,22.,vPos.x-se))*0.18);
    float midZone=smoothstep(8.,22.,vPos.x)*(1.-smoothstep(34.,54.,vPos.x));
    col=mix(col,uMidCol,midZone*0.42);
    col=mix(col,uSkyHorizon,smoothstep(60.,140.,length(vPos.xz))*0.55);
    gl_FragColor=vec4(col,1.);
  }
`;

const waterGeo = new THREE.PlaneGeometry(90,500,200,300);
waterGeo.rotateX(-Math.PI/2);
const waterMesh = new THREE.Mesh(waterGeo, new THREE.ShaderMaterial({
  uniforms:waterUniforms, vertexShader:waterVert, fragmentShader:waterFrag
}));
waterMesh.position.x = 45;
scene.add(waterMesh);

// ── Sand ─────────────────────────────────────────────────────
const sandMat = new THREE.ShaderMaterial({
  polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1,
  uniforms:{
    uTime:       { value:0 },
    uShoreAmp:   { value:0.0 },
    uShoreOffset:{ value:7.0 },
    uShoreSpeed: { value:0.0 },
    uSunDir:     { value:sunDir },
    uSkyHorizon: { value:new THREE.Color(0xd8eef5) },
  },
  vertexShader:`
    varying vec3 vWP;
    void main(){
      vWP=(modelMatrix*vec4(position,1.)).xyz;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
    }
  `,
  fragmentShader:`
    uniform float uTime,uShoreAmp,uShoreOffset,uShoreSpeed;
    uniform vec3 uSunDir,uSkyHorizon;
    varying vec3 vWP;
    float hash(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+19.19);return fract(p.x*p.y);}
    float fbm(vec2 p){float v=0.,a=0.52;for(int i=0;i<5;i++){v+=a*hash(p);p=p*2.2+vec2(1.7,3.1);a*=.48;}return v;}
    float ridge(vec2 p){float n=fbm(p);return 1.0-abs(n*2.0-1.0);}
    float sandHeight(vec2 p){
      float dunes = fbm(p*0.05)*1.35 + fbm(p*0.11+vec2(2.1,4.7))*0.7;
      vec2 rp = vec2(p.x*0.55, p.y*1.55) + vec2(0.6,1.3);
      float ripples = ridge(rp*0.95)*0.62;
      float grains = fbm(p*2.7)*0.08;
      return dunes + ripples + grains;
    }
    float shoreEdge(float z,float t){
      t*=uShoreSpeed;
      return (sin(z*0.048+t*0.18)*5.0
             +sin(z*0.119-t*0.13)*3.0
             +sin(z*0.027+t*0.07)*6.5
             +sin(z*0.073-t*0.09)*2.0)*uShoreAmp+uShoreOffset;
    }
    void main(){
      float se=shoreEdge(vWP.z,uTime);
      if(vWP.x>se+0.5) discard;
      vec2 p=vWP.xz;
      float h=sandHeight(p);
      float e=0.35;
      float hx=sandHeight(p+vec2(e,0.0));
      float hz=sandHeight(p+vec2(0.0,e));
      vec3 N=normalize(vec3(h-hx, 0.65, h-hz));
      vec3 L=normalize(uSunDir);
      vec3 V=normalize(cameraPosition - vWP);
      vec3 H=normalize(L+V);
      float n=fbm(p*0.24),n2=fbm(p*1.2+vec2(4.2,1.8));
      vec3 sandBase=mix(vec3(0.98,0.94,0.84),vec3(0.90,0.85,0.74),n*0.7+n2*0.3);
      sandBase-=fbm(p*5.2)*0.06;
      float pebble=step(0.78,fbm(p*9.))*step(0.6,fbm(p*5.5+vec2(2.1)));
      sandBase=mix(sandBase,sandBase*0.72+vec3(0.04,0.02,-0.02),pebble*0.5);
      float wetFac=1.-smoothstep(se-16.,se+1.0,vWP.x);
      vec3 wetTint=sandBase*0.78+vec3(0.01,0.04,0.06);
      vec3 sand=mix(sandBase,wetTint,wetFac*0.9);
      float diffuse=max(dot(N,L),0.0);
      float back=pow(max(dot(N,-L),0.0),2.0)*0.08;
      float spec=pow(max(dot(N,H),0.0),40.0)*(0.3+wetFac*1.1);
      float sparkle=pow(fbm(p*18.0),9.0)*0.55;
      vec3 ambient=mix(vec3(0.78,0.86,0.92),uSkyHorizon,0.55);
      vec3 col=sand*(0.6+0.85*diffuse)+ambient*0.22+back;
      col+=vec3(1.0,0.97,0.88)*spec;
      col+=vec3(1.0,0.95,0.85)*sparkle*(0.4+wetFac*0.6);
      col-=smoothstep(0.58,0.65,fbm(p*0.18+vec2(1.3))*fbm(p*0.12)*2.5)*0.18;
      gl_FragColor=vec4(clamp(col,0.,1.),1.);
    }
  `,
});

const sandGeo = new THREE.PlaneGeometry(85,500,100,200);
sandGeo.rotateX(-Math.PI/2);
const sandMesh = new THREE.Mesh(sandGeo, sandMat);
sandMesh.receiveShadow = true;
sandMesh.position.x = -27.5;
sandMesh.position.y = 0.015;
scene.add(sandMesh);

// ── 404 Warning Sign — Wes Anderson sprite ────────────────────
const _wesUniforms404 = {
  uWarmth: { value: 0.55 },
  uSat:    { value: 0.83 },
  uFade:   { value: 0.08 },
  uPastel: { value: 0.22 },
};

const _warnSprite = new THREE.Sprite();
_warnSprite.position.set(-35.8, 7.6, 1.1);
scene.add(_warnSprite);

new THREE.TextureLoader().load('sprites/404-warning.webp', tex => {
  tex.colorSpace = THREE.SRGBColorSpace;
  const aspect = tex.image.width / tex.image.height;
  const h = 8.0 * 1.65;
  _warnSprite.scale.set(h * aspect, h, 1);

  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false, toneMapped: false,
  });
  mat.onBeforeCompile = shader => {
    shader.uniforms.uWarmth  = _wesUniforms404.uWarmth;
    shader.uniforms.uSat     = _wesUniforms404.uSat;
    shader.uniforms.uFade    = _wesUniforms404.uFade;
    shader.uniforms.uPastel  = _wesUniforms404.uPastel;
    shader.fragmentShader = `
      uniform float uWarmth, uSat, uFade, uPastel;
      vec3 wesGrade(vec3 c) {
        c = c * (1.0 - uFade) + uFade * vec3(0.13, 0.10, 0.09);
        float lum = dot(c, vec3(0.2126, 0.7152, 0.0722));
        c = mix(vec3(lum), c, uSat);
        c += uWarmth * vec3(0.09, 0.05, -0.07) * (1.0 - abs(c * 2.0 - 1.0));
        float hi = smoothstep(0.38, 0.88, dot(c, vec3(0.333)));
        c = mix(c, c * 0.80 + vec3(0.18, 0.15, 0.12), uPastel * hi);
        return clamp(c, 0.0, 1.0);
      }
    ` + shader.fragmentShader;
    shader.fragmentShader = shader.fragmentShader.replace(
      'outgoingLight = diffuseColor.rgb;',
      'outgoingLight = wesGrade(diffuseColor.rgb);'
    );
  };
  mat.customProgramCacheKey = () => 'wesAnderson404';
  mat.rotation = -0.02;
  _warnSprite.material = mat;
});



// ── Warning sign hover pill ────────────────────────────────────
const _warnRay   = new THREE.Raycaster();
const _warnMouse = new THREE.Vector2();
const _warnPill  = document.getElementById('warnPill');

addEventListener('mousemove', e => {
  _warnMouse.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  _warnRay.setFromCamera(_warnMouse, camera);
  const hits = _warnRay.intersectObject(_warnSprite, false);
  if (hits.length > 0) {
    const proj = _warnSprite.position.clone().project(camera);
    _warnPill.style.left = ((proj.x + 1) / 2 * innerWidth)  + 'px';
    _warnPill.style.top  = ((-proj.y + 1) / 2 * innerHeight) + 'px';
    _warnPill.classList.add('visible');
    document.body.style.cursor = 'pointer';
  } else {
    _warnPill.classList.remove('visible');
    document.body.style.cursor = 'default';
  }
});

addEventListener('click', e => {
  _warnMouse.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  _warnRay.setFromCamera(_warnMouse, camera);
  if (_warnRay.intersectObject(_warnSprite, false).length > 0) {
    window.location.href = '/';
  }
});


// ── Rain ──────────────────────────────────────────────────────
const _rainTime = { value: 0 };
(function(){
  const N = 10000; // number of streaks
  const xz       = new Float32Array(N * 2 * 2); // 2 verts × (x,z)
  const phases   = new Float32Array(N * 2);
  const isBottom = new Float32Array(N * 2);

  for (let i = 0; i < N; i++) {
    const x  = (Math.random() - 0.5) * 220 - 10;
    const z  = (Math.random() - 0.5) * 220;
    const ph = Math.random();
    // top vertex
    xz[i*4+0] = x;  xz[i*4+1] = z;
    phases[i*2+0]   = ph;
    isBottom[i*2+0] = 0.0;
    // bottom vertex
    xz[i*4+2] = x;  xz[i*4+3] = z;
    phases[i*2+1]   = ph;
    isBottom[i*2+1] = 1.0;
  }

  // Index buffer: each pair of vertices = one line segment
  const idx = new Uint32Array(N * 2);
  for (let i = 0; i < N * 2; i++) idx[i] = i;

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('aXZ',      new THREE.BufferAttribute(xz,       2));
  geo.setAttribute('aPhase',   new THREE.BufferAttribute(phases,   1));
  geo.setAttribute('aIsBot',   new THREE.BufferAttribute(isBottom, 1));
  geo.setIndex(new THREE.BufferAttribute(idx, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: _rainTime },
    transparent: true,
    depthWrite: false,
    vertexShader:`
      attribute vec2  aXZ;
      attribute float aPhase;
      attribute float aIsBot;
      uniform float   uTime;
      void main(){
        const float RANGE  = 55.0;
        const float SPEED  = 32.0;
        const float STREAK = 3.0;
        const float WIND   = 0.22;
        float cycY = mod(aPhase * RANGE + RANGE - uTime * SPEED, RANGE);
        float y = cycY - aIsBot * STREAK;
        float x = aXZ.x - cycY * WIND + aIsBot * (STREAK * WIND);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(x, y, aXZ.y, 1.0);
      }
    `,
    fragmentShader:`
      void main(){
        gl_FragColor = vec4(0.55, 0.68, 0.82, 0.60);
      }
    `,
  });

  scene.add(new THREE.LineSegments(geo, mat));
})();


// ── Rain Impacts ──────────────────────────────────────────────
const _impacts = [];

// Geometries with radius=1 so scale directly = world radius
const _rippleGeo = new THREE.RingGeometry(0.55, 1.0, 32);  // water ring (inner/outer ratio)
const _splatGeo  = new THREE.RingGeometry(0.40, 1.0, 24);  // sand splash ring

const POOL_W = 80;
const POOL_S = 50;

for (let i = 0; i < POOL_W + POOL_S; i++) {
  const isWater = i < POOL_W;
  const mat = new THREE.MeshBasicMaterial({
    color: isWater ? 0xaec9d6 : 0xc4c4c4,
    transparent: true, opacity: 0, depthWrite: false,
    side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(isWater ? _rippleGeo : _splatGeo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.visible = false;
  scene.add(mesh);
  _impacts.push({ mesh, isWater, active: false, age: 0, maxAge: 0.9 });
}

const _splatOpacity = 0.82;
const _rippleOpacity = 0.80;

// Physics-tracked drops — same constants as the rain shader
// Each drop has a fixed (x,z) and a phase; we detect when cycY wraps (drop hits ground)
const _RNG = 55, _SPD = 32, _WIND = 0.22;
const _trackDrops = [];
// 220 sand drops across visible sand (x: -62→-4, z: -50→50)
for (let i = 0; i < 220; i++)
  _trackDrops.push({ x: -62 + Math.random()*58, z: (Math.random()-0.5)*80, phase: Math.random(), prevCycY: -1, isWater: false });
// 110 water drops across visible water (x: 8→56, z: -50→50)
for (let i = 0; i < 110; i++)
  _trackDrops.push({ x: 8 + Math.random()*48, z: (Math.random()-0.5)*80, phase: Math.random(), prevCycY: -1, isWater: true });

// ── Resize ────────────────────────────────────────────────────
function _applyControls() {
  const locked = innerWidth <= 1080;
  controls.enableZoom   = !locked;
  controls.enableRotate = !locked;
  controls.enablePan    = !locked;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  // On mobile portrait, raise the look target so the sign is vertically centred
  controls.target.set(2.5, 0.0, 0.0);
  controls.update();
}
_applyControls();
addEventListener('resize', _applyControls);

// ── Animate ───────────────────────────────────────────────────
let t = 0;
let _nextLightning = 2 + Math.random() * 4;
const _lightningEl = document.getElementById('lightning');

(function animate(){
  requestAnimationFrame(animate);
  t += 0.016;
  waterUniforms.uTime.value = t;
  sandMat.uniforms.uTime.value = t;
  _rainTime.value = t;

  // Rain impacts — detect landing via physics (same math as vertex shader)
  _trackDrops.forEach(drop => {
    const cycY = ((drop.phase * _RNG + _RNG - t * _SPD) % _RNG + _RNG) % _RNG;
    // A wrap means cycY jumped up → drop just hit the ground this frame
    if (drop.prevCycY >= 0 && cycY > drop.prevCycY + 1.0) {
      const imp = _impacts.find(im => !im.active && im.isWater === drop.isWater);
      if (imp) {
        // At landing cycY≈0, so WIND offset≈0 — land exactly at (x, z)
        imp.mesh.position.set(drop.x, drop.isWater ? 0.18 : 0.10, drop.z);
        imp.mesh.scale.setScalar(0.05);
        imp.mesh.material.opacity = drop.isWater ? _rippleOpacity : _splatOpacity;
        imp.mesh.visible = true;
        imp.active = true;
        imp.age = 0;
        imp.maxAge = drop.isWater ? 0.65 + Math.random() * 0.45 : 0.35 + Math.random() * 0.20;
      }
    }
    drop.prevCycY = cycY;
  });
  _impacts.forEach(imp => {
    if (!imp.active) return;
    imp.age += 0.016;
    const p = imp.age / imp.maxAge;
    if (p >= 1) { imp.active = false; imp.mesh.visible = false; return; }
    if (imp.isWater) {
      imp.mesh.scale.setScalar(0.05 + p * 2.6);      // ring expands 0→2.6 world units
      imp.mesh.material.opacity = _rippleOpacity * (1 - p);
    } else {
      imp.mesh.scale.setScalar(0.05 + p * 1.4);      // sand ring expands 0→1.4 world units
      imp.mesh.material.opacity = _splatOpacity * (1 - p * p);
    }
  });

  // Lightning flash
  if (t > _nextLightning) {
    _lightningEl.style.background = 'rgba(200,220,255,0.75)';
    setTimeout(() => { _lightningEl.style.background = 'rgba(200,220,255,0.15)'; }, 55);
    setTimeout(() => { _lightningEl.style.background = 'rgba(200,220,255,0)'; }, 140);
    _nextLightning = t + 4 + Math.random() * 3;
    if (window.playThunder) window.playThunder();
  }

  // On mobile/tablet, pin pill above the sign using projected position
  if (innerWidth <= 1080) {
    const proj = _warnSprite.position.clone().project(camera);
    _warnPill.style.left      = ((proj.x + 1) / 2 * innerWidth) + 'px';
    _warnPill.style.top       = ((-proj.y + 1) / 2 * innerHeight - _warnSprite.scale.y * 6 + 256) + 'px';
    _warnPill.style.transform = 'translate(-50%, -100%)';
    _warnPill.classList.add('visible');
    _warnPill.style.pointerEvents = 'auto';
  } else {
    _warnPill.style.transform = 'translate(-50%, -130%)';
    _warnPill.style.pointerEvents = 'none';
  }

  controls.update();
  renderer.render(scene, camera);
})();
</script>

<button id="soundBtn" title="Toggle ocean sound">
  <img id="soundIconOn" src="icons/sound-on.svg" width="18" height="18" style="display:none">
  <img id="soundIconOff" src="icons/sound-off.svg" width="18" height="18">
</button>

<script>
(function(){
  const btn     = document.getElementById('soundBtn');
  const iconOn  = document.getElementById('soundIconOn');
  const iconOff = document.getElementById('soundIconOff');
  let _started = false, _muted = false;
  let _ctx = null, _master = null;

  // ── Preference (cross-page) ───────────────────────────
  const _pref   = localStorage.getItem('soundPref');
  const _wantOn = _pref !== 'off';

  function _showIcon(on) {
    iconOn.style.display  = on ? '' : 'none';
    iconOff.style.display = on ? 'none' : '';
  }

  // ── Noise ─────────────────────────────────────────────
  function buildNoise(ctx) {
    const rate = ctx.sampleRate;
    const len  = rate * 8 | 0;
    const buf  = ctx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < len; i++) {
        const w = Math.random()*2-1;
        b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
        b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
        d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.18;
        b6=w*0.115926;
      }
    }
    return buf;
  }

  function addLayer(hpFreq, lpFreq, gain) {
    const buf = buildNoise(_ctx);
    const src = _ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const hp = _ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=hpFreq;
    const lp = _ctx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=lpFreq;
    const gn = _ctx.createGain(); gn.gain.value = gain;
    src.connect(hp); hp.connect(lp); lp.connect(gn); gn.connect(_master);
    src.start();
  }

  function setMute(m) {
    _muted = m;
    if (_ctx && _master) {
      const ct = _ctx.currentTime;
      _master.gain.cancelScheduledValues(ct);
      _master.gain.setValueAtTime(_master.gain.value, ct);
      _master.gain.linearRampToValueAtTime(m ? 0 : 0.9, ct + 0.05);
    }
    _showIcon(!m);
    localStorage.setItem('soundPref', m ? 'off' : 'on');
  }

  window.playThunder = function() {
    if (!_ctx || _muted) return;
    const rate = _ctx.sampleRate;
    const len  = rate * 4.0 | 0;
    const buf  = _ctx.createBuffer(2, len, rate);
    const sweepSamples = 0.35 * rate;
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      let z = 0;
      for (let i = 0; i < len; i++) {
        const t     = i / rate;
        const prog  = Math.min(1, i / sweepSamples);
        const cutHz = 3000 * Math.pow(100 / 3000, prog);
        const alpha = 1 - Math.exp(-2 * Math.PI * cutHz / rate);
        const env   = (t < 0.012 ? t / 0.012 : 1) * Math.exp(-t * (t < 0.35 ? 4 : 1.0));
        z += alpha * ((Math.random() * 2 - 1) - z);
        d[i] = z * env;
      }
      let pk = 0;
      for (let i = 0; i < len; i++) if (Math.abs(d[i]) > pk) pk = Math.abs(d[i]);
      if (pk > 0) for (let i = 0; i < len; i++) d[i] = d[i] / pk * 0.85;
    }
    const src = _ctx.createBufferSource();
    src.buffer = buf; src.connect(_ctx.destination); src.start(_ctx.currentTime);
  };

  function startAudio() {
    if (_started) return;
    _started = true;
    _ctx = new (window.AudioContext || window.webkitAudioContext)();
    _master = _ctx.createGain();
    _master.gain.value = 0;
    _master.connect(_ctx.destination);
    _ctx.resume().then(() => {
      if (!_muted) {
        _master.gain.setValueAtTime(0, _ctx.currentTime);
        _master.gain.linearRampToValueAtTime(0.9, _ctx.currentTime + 4);
      }
      addLayer( 650, 2000, 0.40);
      addLayer(1400, 4500, 0.25);
    });
    _showIcon(!_muted);
  }

  btn.addEventListener('click', () => {
    if (!_started) {
      _muted = false;
      document.removeEventListener('pointerdown', _autoStart);
      startAudio();
      localStorage.setItem('soundPref', 'on');
    } else {
      setMute(!_muted);
    }
  });

  // ── Auto-start on first interaction if pref is on ─────
  function _autoStart(e) {
    if (e.target.closest('#soundBtn')) return;
    document.removeEventListener('pointerdown', _autoStart);
    startAudio();
  }

  if (_wantOn) {
    _showIcon(true);
    document.addEventListener('pointerdown', _autoStart);
  } else {
    _showIcon(false);
  }
})();
</script>
